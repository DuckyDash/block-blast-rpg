<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Knight Block — RPG Puzzle Battle</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  
  <!-- Google AdSense Global Script -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none;
      -ms-touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      background: #0a0e27;
    }

    body {
      background: linear-gradient(135deg, #0a0e27 0%, #141829 50%, #0a0e27 100%);
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      color: #ffffff;
    }

    /* Pembungkus aplikasi utama */
    #app-wrapper {
      display: flex;
      flex-direction: row;
      width: 100vw;
      height: 100vh;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      background: #0a0e27;
    }

    /* Container game utama */
    #game-container {
      flex-shrink: 0;
      box-shadow: 0 20px 60px rgba(99, 102, 241, 0.3), 0 0 40px rgba(139, 92, 246, 0.2);
      width: 100vw;
      height: 100vh;
      max-width: 100%;
      max-height: 100%;
      overflow: hidden;
      background: #0a0e27;
      z-index: 10;
      animation: fadeIn 0.5s ease-out;
    }

    #game-container canvas {
      touch-action: none;
      user-select: none;
    }

    /* Penataan iklan samping (Desktop) */
    .ad-sidebar {
      width: 180px;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 5;
      background: rgba(17, 24, 39, 0.4);
      border-right: 1px solid rgba(99, 102, 241, 0.15);
      border-left: 1px solid rgba(99, 102, 241, 0.15);
      padding: 10px;
    }

    .ad-sidebar-left {
      order: 1;
    }
    
    #game-container {
      order: 2;
    }

    .ad-sidebar-right {
      order: 3;
    }

    /* Sembunyikan iklan samping di layar kecil */
    @media (max-width: 1100px) {
      .ad-sidebar {
        display: none;
      }
    }

    /* Iklan Banner Bawah (Mobile) */
    .ad-banner-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 15;
      background: rgba(17, 24, 39, 0.85);
      border-top: 1px solid rgba(99, 102, 241, 0.3);
    }

    /* Responsivitas Layar Mobile */
    @media (max-width: 600px) {
      #app-wrapper {
        flex-direction: column;
      }
      
      #game-container {
        /* Susutkan tinggi game agar pas dengan banner bawah */
        height: calc(100vh - 60px) !important;
        width: 100vw !important;
      }

      .ad-banner-bottom {
        display: flex;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.98);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #141829;
    }

    ::-webkit-scrollbar-thumb {
      background: #6366f1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #818cf8;
    }
  </style>
</head>
<body>
  <div id="app-wrapper">
    <!-- Kontainer Iklan Kiri (Desktop) -->
    <div class="ad-sidebar ad-sidebar-left">
      <ins class="adsbygoogle"
           style="display:block;width:160px;height:600px"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
           data-ad-slot="1234567890"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <!-- Kanvas Game Utama -->
    <div id="game-container"></div>

    <!-- Kontainer Iklan Kanan (Desktop) -->
    <div class="ad-sidebar ad-sidebar-right">
      <ins class="adsbygoogle"
           style="display:block;width:160px;height:600px"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
           data-ad-slot="1234567890"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <!-- Kontainer Iklan Bawah (Mobile) -->
    <div class="ad-banner-bottom">
      <ins class="adsbygoogle"
           style="display:inline-block;width:320px;height:50px"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
           data-ad-slot="0987654321"
           data-ad-format="horizontal"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
