<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Block Blast RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      background: linear-gradient(135deg, #0a0e27 0%, #141829 50%, #0a0e27 100%);
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      color: #ffffff;
    }

    /* Add subtle animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.98);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    #game-container {
      animation: fadeIn 0.5s ease-out;
      box-shadow: 0 20px 60px rgba(99, 102, 241, 0.3), 0 0 40px rgba(139, 92, 246, 0.2);
      border-radius: 16px;
      overflow: hidden;
      background: #0a0e27;
    }

    /* Mobile optimization */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      #game-container {
        box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
      }
    }

    /* Scrollbar styling for any overflow */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #141829;
    }

    ::-webkit-scrollbar-thumb {
      background: #6366f1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #818cf8;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
